<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Luxe — Ingresar</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;min-height:100vh;overflow:hidden}
  .bg-animated{background:linear-gradient(135deg,#00417B 0%,#001f3f 40%,#0a0a2e 100%);position:relative}
  .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:drift 8s ease-in-out infinite alternate}
  .orb1{width:600px;height:600px;background:#00CEFE;top:-200px;left:-200px;animation-delay:0s}
  .orb2{width:400px;height:400px;background:#A255FF;bottom:-100px;right:-100px;animation-delay:3s}
  .orb3{width:300px;height:300px;background:#EE2A6E;top:50%;left:60%;animation-delay:1.5s}
  @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.1)}}
  .glass-card{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);box-shadow:0 32px 80px rgba(0,0,0,.4)}
  .input-field{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;transition:all .3s}
  .input-field:focus{outline:none;border-color:#00CEFE;background:rgba(0,206,254,.08);box-shadow:0 0 0 3px rgba(0,206,254,.15)}
  .input-field::placeholder{color:rgba(255,255,255,.4)}
  .btn-login{background:linear-gradient(135deg,#00CEFE,#00417B);transition:all .3s;position:relative;overflow:hidden}
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,206,254,.4)}
  .btn-login:active{transform:translateY(0)}
  .btn-login::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
  .btn-login:hover::before{left:100%}
  .label-float{position:relative}
  .stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
  .logo-pulse{animation:logoPulse 3s ease-in-out infinite}
  @keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(0,206,254,.4))}50%{filter:drop-shadow(0 0 20px rgba(0,206,254,.8))}}
  .slide-up{animation:slideUp .6s cubic-bezier(.16,1,.3,1) forwards;opacity:0;transform:translateY(30px)}
  @keyframes slideUp{to{opacity:1;transform:translateY(0)}}
  .slide-up:nth-child(1){animation-delay:.1s}
  .slide-up:nth-child(2){animation-delay:.2s}
  .slide-up:nth-child(3){animation-delay:.3s}
  .slide-up:nth-child(4){animation-delay:.4s}
  .slide-up:nth-child(5){animation-delay:.5s}
  select.input-field option{background:#001f3f;color:#fff}
</style>
</head>
<body class="bg-animated flex items-center justify-center min-h-screen p-4">

<!-- Orbs -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Stars -->
<div class="stars" id="stars"></div>

<div class="glass-card rounded-3xl p-8 md:p-12 w-full max-w-md z-10 relative">

  <!-- Logo -->
  <div class="text-center mb-8 slide-up">
    <div class="logo-pulse inline-flex items-center justify-center w-20 h-20 rounded-2xl mb-4" style="background:linear-gradient(135deg,#00CEFE22,#00417B44);border:1px solid rgba(0,206,254,.3)">
      <i class="fa-solid fa-building-columns text-3xl" style="color:#00CEFE"></i>
    </div>
    <h1 class="text-3xl font-bold text-white" style="font-family:'Playfair Display',serif">Hotel Luxe</h1>
    <p class="text-sm mt-1" style="color:rgba(255,255,255,.5)">Sistema de Gestión Hotelera</p>
  </div>

  <!-- Form -->
  <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">

    <div class="slide-up">
      <label class="block text-xs font-medium mb-2" style="color:rgba(255,255,255,.6);letter-spacing:.05em;text-transform:uppercase">Correo electrónico</label>
      <div class="relative">
        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-sm" style="color:rgba(255,255,255,.4)"></i>
        <input id="correo" type="email" placeholder="usuario@hotel.com" required
          class="input-field w-full rounded-xl pl-11 pr-4 py-3.5 text-sm">
      </div>
    </div>

    <div class="slide-up">
      <label class="block text-xs font-medium mb-2" style="color:rgba(255,255,255,.6);letter-spacing:.05em;text-transform:uppercase">Contraseña</label>
      <div class="relative">
        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-sm" style="color:rgba(255,255,255,.4)"></i>
        <input id="password" type="password" placeholder="••••••••" required
          class="input-field w-full rounded-xl pl-11 pr-12 py-3.5 text-sm">
        <button type="button" onclick="togglePass()" class="absolute right-4 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer">
          <i id="eyeIcon" class="fa-regular fa-eye text-sm"></i>
        </button>
      </div>
    </div>

    <div class="slide-up">
      <button type="submit" id="btnLogin"
        class="btn-login w-full rounded-xl py-3.5 text-white font-semibold text-sm tracking-wide">
        <span id="btnText"><i class="fa-solid fa-arrow-right-to-bracket mr-2"></i>Ingresar al sistema</span>
        <span id="btnLoad" class="hidden"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Verificando...</span>
      </button>
    </div>

  </form>

  <!-- Quick access -->
  <div class="mt-8 slide-up">
    <p class="text-center text-xs mb-3" style="color:rgba(255,255,255,.3)">— Acceso rápido demo —</p>
    <div class="grid grid-cols-2 gap-3">
      <button onclick="fillDemo('admin@hotel.com','admin123')"
        class="rounded-xl py-2.5 text-xs font-medium transition-all hover:-translate-y-0.5"
        style="background:rgba(0,206,254,.12);border:1px solid rgba(0,206,254,.25);color:#00CEFE">
        <i class="fa-solid fa-shield-halved mr-1.5"></i>Administrador
      </button>
      <button onclick="fillDemo('recep@hotel.com','recep123')"
        class="rounded-xl py-2.5 text-xs font-medium transition-all hover:-translate-y-0.5"
        style="background:rgba(162,85,255,.12);border:1px solid rgba(162,85,255,.25);color:#A255FF">
        <i class="fa-solid fa-concierge-bell mr-1.5"></i>Recepcionista
      </button>
    </div>
  </div>

  <p class="text-center text-xs mt-6" style="color:rgba(255,255,255,.2)">
    <i class="fa-solid fa-lock text-xs mr-1"></i>Conexión segura • Hotel Luxe © 2024
  </p>
</div>

<script>
// Generate stars
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;width:${Math.random()<.3?3:2}px;height:${Math.random()<.3?3:2}px`;
  starsEl.appendChild(s);
}

function togglePass(){
  const p=document.getElementById('password');
  const i=document.getElementById('eyeIcon');
  p.type=p.type==='password'?'text':'password';
  i.className=p.type==='password'?'fa-regular fa-eye text-sm':'fa-regular fa-eye-slash text-sm';
}

function fillDemo(c,p){
  document.getElementById('correo').value=c;
  document.getElementById('password').value=p;
}

function handleLogin(e){
  e.preventDefault();
  const correo=document.getElementById('correo').value;
  const pass=document.getElementById('password').value;
  document.getElementById('btnText').classList.add('hidden');
  document.getElementById('btnLoad').classList.remove('hidden');

  google.script.run
    .withSuccessHandler(res=>{
      document.getElementById('btnText').classList.remove('hidden');
      document.getElementById('btnLoad').classList.add('hidden');
      if(res.ok){
        sessionStorage.setItem('user',JSON.stringify(res));
        Swal.fire({icon:'success',title:'¡Bienvenido!',text:`Hola ${res.nombre}`,timer:1200,showConfirmButton:false,background:'#001f3f',color:'#fff'})
          .then(()=>{ window.location.href='?page=Dashboard'; });
      }else{
        Swal.fire({icon:'error',title:'Acceso denegado',text:'Credenciales incorrectas',background:'#1a0020',color:'#fff',confirmButtonColor:'#EE2A6E'});
      }
    })
    .withFailureHandler(()=>{
      // Demo mode offline
      document.getElementById('btnText').classList.remove('hidden');
      document.getElementById('btnLoad').classList.add('hidden');
      const demos={'admin@hotel.com':'admin123','recep@hotel.com':'recep123'};
      if(demos[correo]===pass){
        const rol=correo.includes('admin')?'Administrador':'Recepcionista';
        sessionStorage.setItem('user',JSON.stringify({ok:true,nombre:rol,rol,id:1}));
        window.location.href='?page=Dashboard';
      }else{
        Swal.fire({icon:'error',title:'Error',text:'Credenciales inválidas',confirmButtonColor:'#EE2A6E'});
      }
    })
    .login(correo,pass);
}
</script>
</body>
</html>
